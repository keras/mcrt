# tests/assets/scenes/diffuse_sphere.yaml
#
# Regression test scene: Lambertian shading + indirect bounce.
#
# A single white diffuse sphere rests on a white floor.  A small emissive
# sphere above acts as a point-like area light.  No env_map is declared so
# the renderer falls back to its built-in procedural sky gradient, providing
# a stable, platform-independent background.

camera:
  look_from: [0.0, 1.5, 5.0]
  look_at:   [0.0, 1.0, 0.0]
  vfov:      40.0
  aperture:  0.0

materials:
  white:
    type: lambertian
    albedo: [0.9, 0.9, 0.9]

  light:
    type: emissive
    albedo:            [1.0, 0.95, 0.85]
    emission_strength: 500.0

objects:
  # White Lambertian sphere — the primary subject.
  - type: sphere
    center:   [0.0, 1.0, 0.0]
    radius:   1.0
    material: white

  # White floor plane (y = 0, normal up).
  - type: plane
    normal:        [0.0, 1.0, 0.0]
    half_extents:  [6, 6]
    material:      white
    backface_culling: true
    transform:
      translate: [0.0, 0.0, 0.0]

  # Small emissive sphere acting as an area light above and to the right.
  - type: sphere
    center:   [2.0, 4.0, 2.0]
    radius:   0.3
    material: light
