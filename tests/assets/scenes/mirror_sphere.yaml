# tests/assets/scenes/mirror_sphere.yaml
#
# Regression test scene: perfect specular reflection.
#
# A single chrome-mirror sphere (metal, fuzz = 0) rests on a white floor.
# Lighting is identical to diffuse_sphere.yaml: one emissive area-light sphere
# above and the procedural sky gradient as background.  Exercises the mirror
# reflection code path in the path tracer.

camera:
  look_from: [0.0, 1.5, 5.0]
  look_at:   [0.0, 1.0, 0.0]
  vfov:      40.0
  aperture:  0.0

materials:
  white:
    type: lambertian
    albedo: [0.9, 0.9, 0.9]

  mirror:
    type: metal
    albedo: [0.95, 0.95, 0.95]
    fuzz:   0.0                 # perfect specular — no roughness

  light:
    type: emissive
    albedo:            [1.0, 0.95, 0.85]
    emission_strength: 500.0

objects:
  # Perfect mirror sphere — the primary subject.
  - type: sphere
    center:   [0.0, 1.0, 0.0]
    radius:   1.0
    material: mirror

  # White floor plane.
  - type: plane
    normal:        [0.0, 1.0, 0.0]
    half_extents:  [6, 6]
    material:      white
    backface_culling: true
    transform:
      translate: [0.0, 0.0, 0.0]

  # Small emissive sphere above and to the right (same position as diffuse scene).
  - type: sphere
    center:   [2.0, 4.0, 2.0]
    radius:   0.3
    material: light
