# tests/assets/scenes/skymap_sphere.yaml
#
# Regression test scene: env-map sampling + importance weighting.
#
# A single white Lambertian sphere rests on a white floor.  There is no
# emissive object — all illumination comes exclusively from the synthetic
# HDR environment map generated by tests/assets/gen_test_skymap.py.
# This makes the scene a direct regression test for the env-map sampling
# and importance-weighting code paths.
#
# PREREQUISITE: run `make gen-test-assets` (or equivalently,
#   uv run tests/assets/gen_test_skymap.py) to create the HDR file before
#   rendering this scene.

env_map: tmp/regression/skyboxes/test_sky.hdr

camera:
  look_from: [0.0, 1.5, 5.0]
  look_at:   [0.0, 1.0, 0.0]
  vfov:      45.0
  aperture:  0.0

materials:
  white:
    type: lambertian
    albedo: [0.9, 0.9, 0.9]
  glass:
    type: dielectric
    ior: 1.5

objects:
  - type: sphere
    center:   [0.0, 1.0, 0.0]
    radius:   1.0
    material: glass

  # White floor plane (y = 0, normal up).
  - type: plane
    normal:        [0.0, 1.0, 0.0]
    half_extents:  [5, 5]
    material:      white
    backface_culling: true
    transform:
      translate: [0.0, 0.0, 0.0]
