name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # build-test: fast checks that run on every push / PR.
  # ---------------------------------------------------------------------------
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required by `make regress`: on pushes it compares
          # HEAD vs HEAD^; on PRs it compares HEAD vs origin/main.
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        # The regression_suite tests are skipped automatically when
        # MCRT_REGRESSION_BASELINE / MCRT_REGRESSION_CURRENT are absent.
        # The shader_integration tests skip GPU-specific paths when no wgpu
        # adapter is available.
        run: cargo test

  # ---------------------------------------------------------------------------
  # wasm-build: verify the project compiles to WASM without errors.
  # Runs in parallel with build-test; does not need a GPU.
  # ---------------------------------------------------------------------------
  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: "v0.21.4"

      - name: trunk build --release
        run: trunk build --release

  # ---------------------------------------------------------------------------
  # regression: full render-and-compare pipeline (make regress).
  # Uses Mesa lavapipe (CPU Vulkan) since GHA runners have no physical GPU.
  # ---------------------------------------------------------------------------
  regression:
    name: Regression Tests (make regress)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-regression-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Vulkan software renderer (Mesa lavapipe)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libvulkan-dev mesa-vulkan-drivers

      - name: Locate lavapipe ICD and export Vulkan env vars
        run: |
          ICD=$(find /usr/share/vulkan/icd.d /etc/vulkan/icd.d \
                     -name 'lvp_icd*.json' 2>/dev/null | sort | head -1)
          if [ -z "$ICD" ]; then
            echo "ERROR: lavapipe ICD not found. Available ICDs:" >&2
            find /usr/share/vulkan /etc/vulkan -name '*.json' 2>/dev/null >&2 || true
            exit 1
          fi
          echo "Found lavapipe ICD: $ICD"
          # VK_ICD_FILENAMES: legacy name; VK_DRIVER_FILES: name used by Vulkan loader >= 1.3.207
          echo "VK_ICD_FILENAMES=$ICD" >> "$GITHUB_ENV"
          echo "VK_DRIVER_FILES=$ICD"  >> "$GITHUB_ENV"

      - name: Install uv (for gen-test-assets)
        uses: astral-sh/setup-uv@v5

      - name: Fetch main branch (for PR regression baseline)
        if: github.event_name == 'pull_request'
        run: git fetch origin main

      - name: Generate test assets
        run: make gen-test-assets

      - name: make regress
        # On pull requests compare against main; otherwise compare against HEAD^.
        # timeout-minutes guards against wgpu/Vulkan adapter init hanging.
        timeout-minutes: 20
        run: make regress FROM=${{ github.event_name == 'pull_request' && 'origin/main' || 'HEAD^' }}
        env:
          # Force wgpu to use the Vulkan back-end so lavapipe is selected on
          # runners without a physical GPU.
          WGPU_BACKEND: vulkan
          # VK_ICD_FILENAMES / VK_DRIVER_FILES are set dynamically by the
          # "Locate lavapipe ICD" step above and exported via $GITHUB_ENV.
