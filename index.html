<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mcrt — WebGPU Path Tracer</title>
  <!-- Trunk: compile Rust → WASM and inject the hashed JS/WASM pair. -->
  
<script type="module" nonce="XAqtmTeLSBh1TldEloRlAg==">
import init, * as bindings from './mcrt-4759e88c3a5169e3.js';
const wasm = await init({ module_or_path: './mcrt-4759e88c3a5169e3_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
  <!-- Trunk: copy the assets/ directory into dist/ for browser fetch access. -->
  
  <!-- Trunk: copy the models/ directory so mesh scenes (e.g. bunny) can load. -->
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      overflow: hidden;
    }
    canvas {
      display: block;
      /* Fill the viewport at all times.  The drawing-buffer (canvas.width /
         canvas.height) is kept in sync from Rust via wgpu surface.configure()
         + the per-frame size poll in web.rs about_to_wait(). */
      width: 100vw;
      height: 100vh;
    }
    #loading {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #ccc;
      font: 16px/1.5 monospace;
      text-align: center;
      pointer-events: none;
    }
  </style>
<link rel="modulepreload" href="./mcrt-4759e88c3a5169e3.js" crossorigin=anonymous integrity="sha384-Ptb34SwsK2abwRmad9FtOBzurr7MRqpvDGatCAM6/ksnXCrFckPMin1FZgWV/4kY"><link rel="preload" href="./mcrt-4759e88c3a5169e3_bg.wasm" crossorigin=anonymous integrity="sha384-IlrkCgU595H7iIhGKX9k7ihIGkCQ+wucFpEnnavOTLWwytgURKnlxBSHsiRVleZ+" as="fetch" type="application/wasm"></head>
<body>
  <!-- winit attaches to this canvas via WindowAttributesExtWebSys::with_canvas -->
  <canvas id="canvas"></canvas>
  <div id="loading">Loading WebGPU path tracer…</div>

  <script>
    const canvas = document.getElementById('canvas');

    // Set the drawing-buffer size once before WASM loads so the canvas has
    // the right physical resolution during the loading animation.
    // After GPU initialisation, Rust owns canvas.width / canvas.height:
    //   • resize() calls canvas.set_width/set_height after surface.configure()
    //   • about_to_wait() polls client dimensions each frame as a safety net
    // No ongoing JS resize listeners are registered — they race with the GPU
    // surface configuration and cause the stretched-render artefact.
    (function() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = Math.round(window.innerWidth  * dpr);
      canvas.height = Math.round(window.innerHeight * dpr);
    })();

    // -------------------------------------------------------------------------
    // Loading overlay — hide once winit starts painting the canvas.
    // -------------------------------------------------------------------------
    const loading = document.getElementById('loading');
    const obs = new MutationObserver(() => {
      loading.style.display = 'none';
      obs.disconnect();
    });
    obs.observe(canvas, { attributes: true });
    // Fallback: hide after 5 s regardless.
    setTimeout(() => { loading.style.display = 'none'; }, 5000);
  </script>
</body>
</html>
