<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mcrt — WebGPU Path Tracer</title>
  <!-- Trunk: compile Rust → WASM and inject the hashed JS/WASM pair. -->
  <link data-trunk rel="rust" href=".." />
  <!-- Trunk: copy the assets/ directory into dist/ for browser fetch access. -->
  <link data-trunk rel="copy-dir" href="../assets" />
  <!-- Trunk: copy the models/ directory so mesh scenes (e.g. bunny) can load. -->
  <link data-trunk rel="copy-dir" href="../models" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      overflow: hidden;
    }
    canvas {
      display: block;
      /* Fill the viewport; the ResizeObserver below keeps the drawing-buffer
         (canvas.width / canvas.height) in sync with the actual pixel size. */
      width: 100vw;
      height: 100vh;
    }
    #loading {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #ccc;
      font: 16px/1.5 monospace;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- winit attaches to this canvas via WindowAttributesExtWebSys::with_canvas -->
  <canvas id="canvas"></canvas>
  <div id="loading">Loading WebGPU path tracer…</div>

  <script>
    // -------------------------------------------------------------------------
    // Dynamic canvas sizing — keep the drawing buffer in sync with the viewport.
    //
    // The canvas CSS is 100vw × 100vh, so the element always fills the window.
    // We still need to update canvas.width / canvas.height (the drawing-buffer
    // resolution) whenever the browser is resized, accounting for devicePixelRatio.
    // winit's own ResizeObserver then detects the attribute change and fires a
    // WindowEvent::Resized so the GPU surface is recreated at the new size.
    // -------------------------------------------------------------------------
    const canvas = document.getElementById('canvas');

    function syncCanvasSize() {
      const dpr = window.devicePixelRatio || 1;
      const w = Math.round(window.innerWidth  * dpr);
      const h = Math.round(window.innerHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width  = w;
        canvas.height = h;
      }
    }

    // Initial sizing before WASM starts (winit will read innerWidth/Height, but
    // setting the attributes early avoids a blank frame at wrong resolution).
    syncCanvasSize();

    // Keep in sync whenever the viewport or DPR changes.
    window.addEventListener('resize', syncCanvasSize);

    // Also cover DPR changes (zoom, moving between monitors).
    function watchDpr() {
      const mq = window.matchMedia(`(resolution: ${window.devicePixelRatio}dppx)`);
      mq.addEventListener('change', () => { syncCanvasSize(); watchDpr(); }, { once: true });
    }
    watchDpr();

    // -------------------------------------------------------------------------
    // Loading overlay — hide once winit starts painting the canvas.
    // -------------------------------------------------------------------------
    const loading = document.getElementById('loading');
    const obs = new MutationObserver(() => {
      loading.style.display = 'none';
      obs.disconnect();
    });
    obs.observe(canvas, { attributes: true });
    // Fallback: hide after 5 s regardless.
    setTimeout(() => { loading.style.display = 'none'; }, 5000);
  </script>
</body>
</html>
