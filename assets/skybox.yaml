camera:
  look_from: [0.0, 2.75,  8.0]
  look_at:   [0.0, 2, 0]
  vfov:      60.0
  aperture:  0.2

env_map: data/golden_gate_hills_2k.hdr

materials:
  white:
    type: lambertian
    albedo: [0.9, 0.9, 0.9]

  green:
    type: lambertian
    albedo: [0.1, 0.7, 0.1]

  glass:
    type: dielectric
    ior: 1.3


# ---------------------------------------------------------------------------
# Objects
# ---------------------------------------------------------------------------
objects:
  # Floor  (y = 0, normal points up)
  - type: plane
    normal: [0.0, 1.0, 0.0]
    half_extents: [5, 5]
    material: white
    backface_culling: true
    transform:
      translate: [0.0, 0.0, 0]

  - type: mesh
    path: models/bunny.obj
    material: white
    transform:
      scale: 8.0
      translate: [0.5, -0.264, 0.0]

  # Glass sphere.
  - type: sphere
    center: [-2, 1.0, 0]
    radius: 1.0
    material: glass

  - type: sphere
    center: [2, 1.0, 1]
    radius: 1.0
    material: green
