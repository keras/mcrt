# Procedural Mediterranean Voxel World — Demo Scene
#
# Generates a 9×9 chunk region (≈ 18 m × 18 m) of eroded limestone terrain
# with karst caves, terra-rossa soil, and dry Mediterranean vegetation (olive
# trees, shrubs).  Lighting comes from the built-in procedural sky gradient —
# no emissive sphere needed, and no over-exposure.
#
# Usage (interactive):
#   cargo run -- --load-scene-yaml assets/world.yaml
#
# Usage (headless render):
#   cargo run -- --headless assets/world.yaml --output world.png \
#                --width 1280 --height 720 --spp 64

camera:
  # Camera sits ~3–5 m above the tallest terrain (max surface ≈ 6 m world-Y).
  # A 50° FOV and gentle downward angle give a wide landscape overview.
  look_from: [0.0, 9.0, 18.0]
  look_at:   [0.0, 3.0, 0.0]
  vfov: 50.0
  aperture: 0.0

# World generator parameters.
# Removing this block disables world generation entirely.
world:
  seed: 42
  view_distance: 4    # (2*4+1)² = 81 chunks, 18 m × 18 m footprint

# Block material palette — must contain an entry for each block type used by
# the generator.  Names match BLOCK_META[id].material_name in block.rs.
world_materials:
  limestone: { type: lambertian, albedo: [0.80, 0.76, 0.68] }
  red_soil:  { type: lambertian, albedo: [0.52, 0.22, 0.12] }
  grass:     { type: lambertian, albedo: [0.32, 0.45, 0.18] }
  sand:      { type: lambertian, albedo: [0.76, 0.69, 0.50] }
  water:     { type: lambertian, albedo: [0.10, 0.30, 0.70] }
  wood:      { type: lambertian, albedo: [0.32, 0.26, 0.18] }
  leaves:    { type: lambertian, albedo: [0.18, 0.38, 0.14] }
  shrub:     { type: lambertian, albedo: [0.22, 0.36, 0.10] }
  gravel:    { type: lambertian, albedo: [0.45, 0.42, 0.40] }
  cave_glow:
    type: emissive
    albedo: [0.55, 0.80, 1.00]
    emission_strength: 2.0

# No static objects — the procedural world provides all geometry.
# The 'objects' key is required by the YAML parser even when empty.
objects: []
